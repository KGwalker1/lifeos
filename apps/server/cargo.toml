[package]
name = "server"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

tracing = "0.1"
tracing-subscriber = "0.3"

lifeos-core = { path = "../../crates/lifeos-core" }
lifeos-storage = { path = "../../crates/lifeos-storage" }
lifeos-sync = { path = "../../crates/lifeos-sync" }
lifeos-engine = { path = "../../crates/lifeos-engine" }